name: Python conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Biosigpy
        uses: actions/checkout@v4
        with:
          path: biosigpy

      - name: Read Biosiglib pin
        id: biosiglib-pin
        working-directory: biosigpy
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          manifest = json.loads(Path("conformance.json").read_text(encoding="utf-8"))
          commit = manifest["biosiglib"]["commit"]
          release = manifest["biosiglib"].get("release", "")
          print(f"commit={commit}")
          print(f"release={release}")
          PY

      - name: Check out pinned Biosiglib
        uses: actions/checkout@v4
        with:
          repository: BSICoS/biosiglib
          ref: ${{ steps.biosiglib-pin.outputs.commit }}
          path: biosiglib
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: biosigpy/requirements-dev.txt

      - name: Install development dependencies
        working-directory: biosigpy
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: biosigpy
        env:
          BIOSIGLIB_ROOT: ${{ github.workspace }}/biosiglib
        run: python -m pytest

      - name: Validate conformance manifest
        working-directory: biosigpy
        run: python ../biosiglib/tools/validate_specs.py --manifest conformance.json
