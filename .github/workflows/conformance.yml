name: Python conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Biosigpy
        uses: actions/checkout@v4
        with:
          path: biosigpy

      - name: Check out pinned Biosiglib
        uses: actions/checkout@v4
        with:
          repository: BSICoS/biosiglib
          ref: 1f0a99943704e91f1102df3f50e28904e1cee43d
          path: biosiglib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: biosigpy/requirements-dev.txt

      - name: Install development dependencies
        working-directory: biosigpy
        run: python -m pip install -r requirements-dev.txt

      - name: Run pytest
        working-directory: biosigpy
        env:
          BIOSIGLIB_ROOT: ${{ github.workspace }}/biosiglib
        run: python -m pytest

      - name: Validate conformance manifest
        working-directory: biosigpy
        run: python ../biosiglib/tools/validate_specs.py --manifest conformance.json
