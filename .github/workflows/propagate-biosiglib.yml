name: Propagate Biosiglib Release

on:
  workflow_dispatch:
    inputs:
      biosiglib_release:
        description: "Biosiglib release tag, e.g. v0.1.0"
        required: true
        type: string
      biosiglib_commit:
        description: "Biosiglib release target commit SHA"
        required: true
        type: string
  repository_dispatch:
    types: [biosiglib-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  propagate:
    runs-on: ubuntu-latest
    env:
      BIOSIGLIB_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.biosiglib_release || github.event.client_payload.release }}
      BIOSIGLIB_COMMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.biosiglib_commit || github.event.client_payload.commit }}
      BIOSIGLIB_ROOT: ${{ github.workspace }}/biosiglib

    steps:
      - name: Check out Biosigpy
        uses: actions/checkout@v4
        with:
          path: biosigpy

      - name: Validate propagation inputs
        id: propagation-inputs
        shell: bash
        run: |
          if [[ ! "$BIOSIGLIB_RELEASE" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Biosiglib release must match vMAJOR.MINOR.PATCH: $BIOSIGLIB_RELEASE" >&2
            exit 1
          fi
          if [[ ! "$BIOSIGLIB_COMMIT" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Biosiglib commit must be a 40-character SHA: $BIOSIGLIB_COMMIT" >&2
            exit 1
          fi
          normalized_commit="$(echo "$BIOSIGLIB_COMMIT" | tr '[:upper:]' '[:lower:]')"
          release_semver="${BIOSIGLIB_RELEASE#v}"
          echo "BIOSIGLIB_COMMIT=$normalized_commit" >> "$GITHUB_ENV"
          echo "BIOSIGLIB_RELEASE_SEMVER=$release_semver" >> "$GITHUB_ENV"
          echo "biosiglib_commit=$normalized_commit" >> "$GITHUB_OUTPUT"
          echo "biosiglib_release_semver=$release_semver" >> "$GITHUB_OUTPUT"

      - name: Check out Biosiglib
        uses: actions/checkout@v4
        with:
          repository: BSICoS/biosiglib
          ref: ${{ steps.propagation-inputs.outputs.biosiglib_commit }}
          path: biosiglib
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Biosiglib release
        shell: bash
        run: |
          actual_commit="$(git -C biosiglib rev-parse HEAD | tr '[:upper:]' '[:lower:]')"
          release_commit="$(git -C biosiglib rev-list -n 1 "$BIOSIGLIB_RELEASE" | tr '[:upper:]' '[:lower:]')"
          if [[ "$actual_commit" != "$BIOSIGLIB_COMMIT" ]]; then
            echo "Biosiglib checkout mismatch: expected $BIOSIGLIB_COMMIT, got $actual_commit" >&2
            exit 1
          fi
          if [[ "$release_commit" != "$BIOSIGLIB_COMMIT" ]]; then
            echo "Release $BIOSIGLIB_RELEASE points to $release_commit, not $BIOSIGLIB_COMMIT" >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            biosigpy/requirements-dev.txt
            biosiglib/requirements-dev.txt

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r biosigpy/requirements-dev.txt
          python -m pip install -r biosiglib/requirements-dev.txt

      - name: Update conformance manifest
        id: manifest-update
        working-directory: biosigpy
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          path = Path("conformance.json")
          manifest = json.loads(path.read_text(encoding="utf-8"))
          release_semver = os.environ["BIOSIGLIB_RELEASE_SEMVER"]
          commit = os.environ["BIOSIGLIB_COMMIT"].lower()

          manifest["biosiglib"]["release"] = release_semver
          manifest["biosiglib"]["commit"] = commit
          manifest["$schema"] = re.sub(
              r"/[0-9a-fA-F]{40}/",
              f"/{commit}/",
              manifest["$schema"],
              count=1,
          )

          statuses = ", ".join(
              f"{specification_id}: {entry['status']}"
              for specification_id, entry in manifest["specifications"].items()
          )
          path.write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              print(f"manifest-statuses={statuses}", file=output)
          PY
          git diff -- conformance.json

      - name: Validate conformance manifest
        working-directory: biosigpy
        run: python ../biosiglib/tools/validate_specs.py --manifest conformance.json

      - name: Run full Python test suite
        working-directory: biosigpy
        run: python -m pytest

      - name: Check whitespace
        working-directory: biosigpy
        run: git diff --check

      - name: Detect manifest change
        id: manifest-change
        working-directory: biosigpy
        shell: bash
        run: |
          if git diff --quiet -- conformance.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "conformance.json already pins $BIOSIGLIB_RELEASE at $BIOSIGLIB_COMMIT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open propagation pull request
        if: steps.manifest-change.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          path: biosigpy
          add-paths: conformance.json
          commit-message: Propagate Biosiglib ${{ env.BIOSIGLIB_RELEASE }}
          branch: chore/biosiglib-${{ env.BIOSIGLIB_RELEASE }}
          delete-branch: true
          base: main
          title: Propagate Biosiglib ${{ env.BIOSIGLIB_RELEASE }}
          body: |
            Propagates a validated Biosiglib release into Biosigpy.

            - Biosiglib release tag: `${{ env.BIOSIGLIB_RELEASE }}`
            - Biosiglib commit: `${{ steps.propagation-inputs.outputs.biosiglib_commit }}`
            - Manifest statuses: ${{ steps.manifest-update.outputs.manifest-statuses }}
            - Validation: external manifest validation, full `pytest` suite, and `git diff --check` passed.
            - Shared fixtures and conformance cases were consumed from Biosiglib and were not copied into Biosigpy.
